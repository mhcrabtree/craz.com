<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Crabtree Labz</title>
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@400;600&family=Nunito:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/contact.css">
</head>

<body>
  <header class="site-header" role="banner">
    <a href="index.html"><img src="images/logo.png" alt="Crabtree Labz" class="logo small"></a>
    <nav aria-label="Primary">
      <ul>
        <li><a href="story.html">Story</a></li>
        <li><a href="brands.html">Brands</a></li>
        <li><a href="privacy.html">Privacy</a></li>
        <li><a href="terms.html">Terms</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-article" role="main">
    <article>
      <h1>Contact</h1>
      <p>If you’d like to say hello, ask about collaborations, or just share something delightful, send us a note.</p>

      <div id="form-messages"></div>

      <form action="#" method="post" style="max-width:560px; margin:18px 0 40px;">

        <div style="display:none;">
          <label>Leave this field empty</label>
          <input type="text" name="website" autocomplete="off">
        </div>

        <label for="name">Name</label><br>
        <input id="name" name="name" type="text" placeholder="Your name" style="width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid rgba(0,0,0,0.08);">

        <label for="email">Email</label><br>
        <input id="email" name="email" type="email" placeholder="you@example.com" style="width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid rgba(0,0,0,0.08);">

        <label for="message">Message</label><br>
        <textarea id="message" name="message" rows="6" placeholder="Hi!" style="width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid rgba(0,0,0,0.08);"></textarea>

        <!--
        <p style="color:rgba(0,0,0,0.45);font-size:0.95rem;margin:8px 0;">We will respond within the next 48 business hours.</p>
        -->

        <button type="submit" style="background:#000;color:#fff;padding:10px 16px;border-radius:8px;border:none;">Send</button>
      </form>
    </article>
  </main>

  <div class="footer">© 2026 Crabtree Labz</div>
  <script src="js/contact.js"></script>
</body>
</html>
