<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crabtree Labz</title>

  <!-- Google Fonts: Grandstander + Nunito -->
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@400;600&family=Nunito:wght@300&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #222222;
      --footer: rgba(0, 0, 0, 0.45);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Grandstander', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .container {
      max-width: 700px;
      padding: 20px;
      margin-top: -100px; /* moves content UP */
    }

    img.logo {
      width: 260px;
      max-width: 80%;
      height: auto;
      margin-bottom: 24px;
    }

    h1.slogan {
      font-weight: 600;
      font-size: 1.8rem;
      line-height: 1.3;
      margin: 0;
      padding: 0 10px;
    }

    @media (max-width: 480px) {
      h1.slogan {
        font-size: 1.4rem;
      }
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 12px;
      width: 100%;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: var(--footer);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="Crabtree Labz" class="logo" />
    <h1 class="slogan">Life Experiments in Curiosity, Chaos, and Color</h1>
  </div>

  <div class="footer">
    © 2026 Crabtree Labz
  </div>
</body>
</html>
